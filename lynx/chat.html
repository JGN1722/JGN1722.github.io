<html>
	<head>
		<title>Lynx Vifs</title>
		<script type="text/javascript" src="chat.js"></script>
		<link rel="stylesheet" href="chat.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	</head>
	<body>
		<section class="msger">
			<header class="msger-header">
				<div class="msger-header-title">Discussion de patrouille</div>
			</header>

			<main class="msger-chat">
				<div class="msg left-msg">
					<div class="msg-img" style="background-image: url(https://image.flaticon.com/icons/svg/327/327779.svg);"></div>

					<div class="msg-bubble">
						<div class="msg-info">
							<div class="msg-info-name">LeMeilleurCpDeTousLesTemps</div>
							<div class="msg-info-time">12:45</div>
						</div>

						<div class="msg-text">
							Salut, vous êtes prêts pour la sortie gateaux ?
						</div>
					</div>
				</div>

				<div class="msg right-msg">
					<div class="msg-img" style="background-image: url(https://image.flaticon.com/icons/svg/145/145867.svg);"></div>

					<div class="msg-bubble">
						<div class="msg-info">
							<div class="msg-info-name">PatrouillardDu93</div>
							<div class="msg-info-time">12:46</div>
						</div>

						<div class="msg-text">
							Yes, bien sur, je kiffe me prendre des vents par les gens pendant 2h
						</div>
					</div>
				</div>
			</main>

			<form class="msger-inputarea">
				<input type="text" class="msger-input" id="msger-input" placeholder="Enter your message..." />
				<button type="submit" class="msger-send-btn">Send</button>
			</form>
		</section>
	</body>
	<script>
		window.onload = function() {
			resizeFont("msger-input");
			resizeFont("msger-send-btn");
		};
		
		window.onresize = function() {
			resizeFont("msger-input");
			resizeFont("msger-send-btn");
		};
		
		function resizeFont(idName) {
			elm = document.getElementById(idName)
			//get element height
			var height = getInnerHeight(elm)
			//set font height
			elm.style.fontSize = height + "px"
		}
		function getInnerHeight(elm) {
			var computed = getComputedStyle(elm)
			var padding = parseInt(computed.paddingTop) + parseInt(computed.paddingBottom)
			return elm.clientHeight - padding
		}
	</script>
</html>
